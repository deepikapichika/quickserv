spring.datasource.url=jdbc:mysql://localhost:3306/quickserv
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.thymeleaf.cache=false

# Mail SMTP config (defaults to Gmail; override via env vars for SendGrid/other providers)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Password reset behavior
app.reset-password.base-url=${APP_RESET_BASE_URL:http://localhost:8080}
app.reset-password.expiry-minutes=${APP_RESET_EXPIRY_MINUTES:30}
app.reset-password.from=${MAIL_FROM:${spring.mail.username}}
