# ===== ADMIN SEED ACCOUNT =====
# Default admin credentials created on first startup.
# Override these values (or set via environment variables) before deploying to production.
admin.default.email=admin@quickserve.com
admin.default.password=Admin@123

# ===== DATABASE CONNECTION =====
spring.datasource.url=jdbc:mysql://localhost:3306/quickserv?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / HIBERNATE =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ===== THYMELEAF =====
spring.thymeleaf.cache=false

# ===== SERVER =====
server.port=8080