# ===== DATABASE CONNECTION =====
spring.datasource.url=jdbc:mysql://localhost:3306/quickserv?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / HIBERNATE =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ===== THYMELEAF =====
spring.thymeleaf.cache=false

# ===== SERVER =====
server.port=8080

# ===== EMAIL CONFIGURATION =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ===== RAZORPAY CONFIGURATION =====
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_1234567890}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:test_secret_key}
