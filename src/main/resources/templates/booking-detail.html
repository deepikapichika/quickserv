<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Booking Details - QuickServ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h3>Booking Details</h3>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <p><strong>Booking ID:</strong> #<span th:text="${booking.id}"></span></p>
                            <p><strong>Status:</strong>
                                <span class="badge"
                                      th:classappend="${booking.status == T(com.quickserv.quickserv.entity.Booking.BookingStatus).PENDING} ? 'bg-warning' :
                                                     ${booking.status == T(com.quickserv.quickserv.entity.Booking.BookingStatus).CONFIRMED} ? 'bg-info' :
                                                     ${booking.status == T(com.quickserv.quickserv.entity.Booking.BookingStatus).COMPLETED} ? 'bg-success' :
                                                     ${booking.status == T(com.quickserv.quickserv.entity.Booking.BookingStatus).CANCELLED} ? 'bg-secondary' : 'bg-danger'"
                                      th:text="${booking.status}"></span>
                            </p>
                        </div>
                        <div class="col-md-6 text-end">
                            <p><strong>Booked On:</strong> <span th:text="${#temporals.format(booking.createdAt, 'dd MMM yyyy')}"></span></p>
                        </div>
                    </div>

                    <hr>

                    <h5>Service Details</h5>
                    <p><strong>Service:</strong> <span th:text="${booking.service.title}"></span></p>
                    <p><strong>Description:</strong> <span th:text="${booking.service.description}"></span></p>
                    <p><strong>Amount:</strong> ₹<span th:text="${booking.totalAmount}"></span></p>

                    <hr>

                    <h5>Provider Details</h5>
                    <p><strong>Name:</strong> <span th:text="${booking.provider.name}"></span></p>
                    <p><strong>Email:</strong> <span th:text="${booking.provider.email}"></span></p>
                    <p><strong>Phone:</strong> <span th:text="${booking.provider.phone}"></span></p>

                    <hr>

                    <h5>Appointment Details</h5>
                    <p><strong>Date & Time:</strong> <span th:text="${#temporals.format(booking.bookingDateTime, 'dd MMM yyyy, hh:mm a')}"></span></p>
                    <p th:if="${booking.customerNotes}"><strong>Your Notes:</strong> <span th:text="${booking.customerNotes}"></span></p>
                    <p th:if="${booking.providerNotes}"><strong>Provider Notes:</strong> <span th:text="${booking.providerNotes}"></span></p>

                    <div class="mt-4">
                        <a href="javascript:history.back()" class="btn btn-secondary">Back</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
