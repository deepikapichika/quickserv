<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book Service - QuickServ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h3>Book Service</h3>
                </div>
                <div class="card-body">
                    <div class="mb-4">
                        <h5 th:text="${service.title}"></h5>
                        <p th:text="${service.description}"></p>
                        <p><strong>Price:</strong> ₹<span th:text="${service.price}"></span> <span th:text="${service.priceUnit}"></span></p>
                        <p><strong>Provider:</strong> <span th:text="${service.provider.name}"></span></p>
                    </div>

                    <form th:action="@{/bookings/create}" method="post">
                        <input type="hidden" name="serviceId" th:value="${service.id}">

                        <div class="mb-3">
                            <label class="form-label">Booking Date & Time</label>
                            <input type="datetime-local" name="bookingDateTime" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Additional Notes (Optional)</label>
                            <textarea name="customerNotes" class="form-control" rows="3"
                                      placeholder="Any special requirements or instructions..."></textarea>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Confirm Booking</button>
                            <a th:href="@{/service/{id}(id=${service.id})}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
