<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Services - QuickServ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="browse-page">
<!-- Navbar with Dark Amethyst theme -->
<nav class="navbar navbar-expand-lg navbar-dark browse-navbar">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="fas fa-bolt"></i> QuickServ
        </a>

        <!-- Navbar links -->
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/browse">Browse</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/customer/dashboard">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link btn-logout" href="/logout">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </li>
            </ul>
        </div>

        <!-- Mobile menu button -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
    </div>
</nav>

<!-- Main Container -->
<div class="main-container">
    <!-- Hero Section with Background Image -->
    <div class="hero-section">
        <h1 class="hero-title">Find Local Services</h1>
        <p style="color: rgba(224,170,255,0.9); font-size: 18px;">Discover trusted professionals in your area</p>
    </div>

    <!-- Search Section -->
    <div class="search-card">
        <h2 class="search-title">Search Services</h2>
        <form action="/browse" method="get" class="row g-3" id="browseFilterForm">
            <div class="col-md-3">
                <input type="text" name="search" class="form-control search-input"
                       placeholder="Search services..." th:value="${searchKeyword}">
            </div>
            <div class="col-md-3">
                <input type="text" name="location" class="form-control search-input"
                       placeholder="Location" th:value="${selectedLocation}">
            </div>
            <div class="col-md-3">
                <select id="categoryFilter" name="categoryId" class="form-control search-select">
                    <option value="">All Categories</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"
                            th:selected="${selectedCategory == cat.id}"></option>
                </select>
            </div>
            <div class="col-md-3">
                <select id="subcategoryFilter" name="subcategoryId" class="form-control search-select">
                    <option value="">All Subcategories</option>
                    <option th:each="sub : ${subcategories}"
                            th:value="${sub.id}"
                            th:data-category-id="${sub.category.id}"
                            th:text="${sub.name}"
                            th:selected="${selectedSubcategory == sub.id}"></option>
                </select>
            </div>
            <div class="col-md-3">
                <input type="number" min="0" step="1" name="minPrice" class="form-control search-input"
                       placeholder="Min Price" th:value="${selectedMinPrice}">
            </div>
            <div class="col-md-3">
                <input type="number" min="0" step="1" name="maxPrice" class="form-control search-input"
                       placeholder="Max Price" th:value="${selectedMaxPrice}">
            </div>
            <div class="col-md-3">
                <button type="submit" class="btn btn-search w-100">
                    <i class="fas fa-search"></i> Apply Filters
                </button>
            </div>
            <div class="col-md-3">
                <a href="/browse" class="btn btn-outline-light w-100">Clear</a>
            </div>
        </form>
    </div>

    <!-- Services List -->
    <div th:if="${not #lists.isEmpty(services)}">
        <div class="browse-service-card" th:each="service : ${services}">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h3 class="service-title" th:text="${service.title}">Service Title</h3>
                    <p class="service-description" th:text="${service.description}">Description</p>
                    <div class="service-price">
                        <span class="price-highlight">₹<span th:text="${service.price}"></span></span>
                        <span th:text="${service.priceUnit}"></span>
                    </div>
                    <p class="service-provider">
                        <i class="fas fa-user"></i> <span th:text="${service.provider.name}">Provider Name</span>
                    </p>
                    <p class="service-provider">
                        <i class="fas fa-tag"></i>
                        <span th:text="${service.category.name}">Category</span>
                        <span th:if="${service.subcategory != null}">- <span th:text="${service.subcategory.name}">Subcategory</span></span>
                    </p>
                    <p class="service-location">
                        <i class="fas fa-map-marker-alt"></i>
                        <span th:text="${service.serviceLocations != null ? service.serviceLocations : service.location}">Location</span>
                    </p>
                </div>
                <div class="col-md-4 text-center">
                    <a th:href="@{'/service/' + ${service.id}}" class="btn-view">
                        View Details <i class="fas fa-arrow-right"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- No Services Found -->
    <div th:unless="${not #lists.isEmpty(services)}" class="text-center" style="padding: 60px; background: rgba(22,0,50,0.9); border-radius: 15px;">
        <i class="fas fa-search" style="font-size: 48px; color: #E0AAFF; opacity: 0.5;"></i>
        <h3 style="color: white; margin-top: 20px;">No services found</h3>
        <p style="color: rgba(224,170,255,0.7);">Try adjusting your search or filters</p>
    </div>
</div>

<script>
    const categoryFilter = document.getElementById('categoryFilter');
    const subcategoryFilter = document.getElementById('subcategoryFilter');

    function syncSubcategoryOptions() {
        const selectedCategoryId = categoryFilter.value;
        const currentSubcategoryId = subcategoryFilter.value;

        Array.from(subcategoryFilter.options).forEach((option) => {
            if (!option.value) {
                option.hidden = false;
                return;
            }

            const optionCategoryId = option.getAttribute('data-category-id');
            const shouldShow = !selectedCategoryId || optionCategoryId === selectedCategoryId;
            option.hidden = !shouldShow;

            if (!shouldShow && option.selected) {
                option.selected = false;
            }
        });

        if (currentSubcategoryId && !Array.from(subcategoryFilter.options).some((o) => o.value === currentSubcategoryId && !o.hidden)) {
            subcategoryFilter.value = '';
        }
    }

    categoryFilter.addEventListener('change', syncSubcategoryOptions);
    syncSubcategoryOptions();
</script>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
