<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Bookings - QuickServ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>My Bookings</h2>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div th:if="${bookings.isEmpty()}" class="alert alert-info">
        You haven't made any bookings yet. <a th:href="@{/browse}">Browse services</a>
    </div>

    <div th:if="${!bookings.isEmpty()}">
        <div class="card mb-3" th:each="booking : ${bookings}">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-8">
                        <h5 th:text="${booking.service.title}"></h5>
                        <p><strong>Provider:</strong> <span th:text="${booking.provider.name}"></span></p>
                        <p><strong>Date & Time:</strong> <span th:text="${#temporals.format(booking.bookingDateTime, 'dd MMM yyyy, hh:mm a')}"></span></p>
                        <p><strong>Amount:</strong> ₹<span th:text="${booking.totalAmount}"></span></p>
                        <p th:if="${booking.customerNotes}"><strong>Notes:</strong> <span th:text="${booking.customerNotes}"></span></p>
                        <p th:if="${booking.providerNotes}"><strong>Provider Notes:</strong> <span th:text="${booking.providerNotes}"></span></p>
                    </div>
                    <div class="col-md-4 text-end">
                        <span class="badge"
                              th:classappend="${booking.status == T(com.quickserv.quickserv.entity.Booking.BookingStatus).PENDING} ? 'bg-warning' :
                                             ${booking.status == T(com.quickserv.quickserv.entity.Booking.BookingStatus).CONFIRMED} ? 'bg-info' :
                                             ${booking.status == T(com.quickserv.quickserv.entity.Booking.BookingStatus).COMPLETED} ? 'bg-success' :
                                             ${booking.status == T(com.quickserv.quickserv.entity.Booking.BookingStatus).CANCELLED} ? 'bg-secondary' : 'bg-danger'"
                              th:text="${booking.status}"></span>

                        <div class="mt-3">
                            <a th:href="@{/bookings/{id}(id=${booking.id})}" class="btn btn-sm btn-info">View Details</a>

                            <form th:if="${booking.status == T(com.quickserv.quickserv.entity.Booking.BookingStatus).PENDING}"
                                  th:action="@{/bookings/cancel/{id}(id=${booking.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-danger"
                                        onclick="return confirm('Are you sure you want to cancel this booking?')">Cancel</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
