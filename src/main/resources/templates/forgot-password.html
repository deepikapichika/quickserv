<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - QuickServ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #6a2d91 0%, #5a1f7d 50%, #4a1570 100%);
            padding: 20px;
        }
        .card {
            width: 100%;
            max-width: 430px;
            background: rgba(100, 40, 150, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            padding: 36px;
            color: #fff;
        }
        h1 { text-align: center; margin-bottom: 22px; }
        p { color: #e0d5ff; margin-bottom: 18px; line-height: 1.45; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; color: #e0d5ff; }
        input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.35);
            background: rgba(255,255,255,0.12);
            color: #fff;
            outline: none;
        }
        input::placeholder { color: rgba(255,255,255,0.65); }
        .btn {
            width: 100%;
            border: none;
            border-radius: 999px;
            padding: 12px;
            font-weight: 700;
            color: #6a2d91;
            background: #fff;
            cursor: pointer;
            margin-top: 6px;
        }
        .muted-link { text-align: center; margin-top: 14px; }
        .muted-link a { color: #fff; text-decoration: none; }
        .alert {
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 14px;
            font-size: 14px;
            border: 1px solid;
        }
        .alert-success {
            background: rgba(76, 175, 80, 0.2);
            color: #b3e5b3;
            border-color: rgba(76, 175, 80, 0.5);
        }
        .alert-danger {
            background: rgba(244, 67, 54, 0.2);
            color: #ff9999;
            border-color: rgba(244, 67, 54, 0.5);
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Forgot Password</h1>
    <p>Enter your email. If it exists in QuickServ, we will send a reset link.</p>

    <div th:if="${message}" class="alert alert-success" th:text="${message}">Request processed.</div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}">Unable to process request.</div>

    <form action="/forgot-password" method="post">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>
        <button class="btn" type="submit">Send Reset Link</button>
    </form>

    <p class="muted-link"><a href="/login">Back to Login</a></p>
</div>
</body>
</html>
