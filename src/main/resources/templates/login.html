<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QuickServ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Hide scrollbars (scroll still works) */
        *::-webkit-scrollbar { width: 0; height: 0; background: transparent; }
        *::-webkit-scrollbar-thumb { background: transparent; }
        *::-webkit-scrollbar-track { background: transparent; }
        * { scrollbar-width: none; -ms-overflow-style: none; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #6a2d91 0%, #5a1f7d 50%, #4a1570 100%);
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 24px 0;
        }

        /* Starry background */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                    radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                    radial-gradient(2px 2px at 60px 70px, #fff, rgba(0,0,0,0)),
                    radial-gradient(1px 1px at 50px 50px, #fff, rgba(0,0,0,0)),
                    radial-gradient(1px 1px at 130px 80px, #fff, rgba(0,0,0,0)),
                    radial-gradient(2px 2px at 90px 10px, #fff, rgba(0,0,0,0)),
                    radial-gradient(2px 2px at 130px 140px, #eee, rgba(0,0,0,0)),
                    radial-gradient(1px 1px at 200px 140px, #fff, rgba(0,0,0,0)),
                    radial-gradient(1px 1px at 130px 180px, #fff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: twinkle 5s ease-in-out infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Forest background - entire width */
        body::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            height: 55%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" preserveAspectRatio="none"><defs><linearGradient id="forestGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:rgba(40,15,60,0);stop-opacity:1" /><stop offset="40%" style="stop-color:rgba(30,10,50,0.4);stop-opacity:1" /><stop offset="100%" style="stop-color:rgba(15,5,25,1);stop-opacity:1" /></linearGradient></defs><g fill="url(%23forestGrad)"><polygon points="0,250 30,150 60,250 100,100 140,250 180,120 220,250 260,140 300,250 340,110 380,250 420,130 460,250 500,100 540,250 580,140 620,250 660,120 700,250 740,150 780,250 820,100 860,250 900,130 940,250 980,120 1020,250 1060,150 1100,250 1140,110 1200,250"/></g></svg>') no-repeat bottom;
            background-size: cover;
            background-position: bottom;
            pointer-events: none;
            z-index: 2;
        }

        .login-container {
            background: rgba(100, 40, 150, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            max-height: calc(100vh - 48px);
            overflow-y: auto;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 35px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #e0d5ff;
            margin-bottom: 8px;
            text-transform: capitalize;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-control {
            width: 100%;
            padding: 14px 18px 14px 45px;
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        .form-control:focus {
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 10px rgba(200, 100, 255, 0.3);
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 18px;
        }

        .checkbox-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 25px 0;
            font-size: 14px;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: none;
            letter-spacing: normal;
            font-weight: 500;
            color: #e0d5ff;
            margin: 0;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #7b3fa3;
        }

        .forgot-link {
            color: #e0d5ff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .forgot-link:hover {
            color: #fff;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #fff;
            color: #6a2d91;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin: 15px 0 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .register-link {
            text-align: center;
            color: #e0d5ff;
            font-size: 14px;
        }

        .register-link a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .register-link a:hover {
            color: #ffeb3b;
        }

        /* Alert messages */
        .alert {
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid;
        }

        .alert-success {
            background: rgba(76, 175, 80, 0.2);
            color: #b3e5b3;
            border-color: rgba(76, 175, 80, 0.5);
        }

        .alert-danger {
            background: rgba(244, 67, 54, 0.2);
            color: #ff9999;
            border-color: rgba(244, 67, 54, 0.5);
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 35px;
                margin: 20px;
                max-height: calc(100vh - 40px);
            }

            h1 {
                font-size: 28px;
                margin-bottom: 25px;
            }

            .form-control {
                padding: 12px 15px 12px 40px;
            }
        }
    </style>
</head>
<body>
<div class="login-container">
    <h1>Login</h1>

    <!-- Success message after logout -->
    <div th:if="${param.logout}" class="alert alert-success">
        You've been logged out successfully!
    </div>

    <!-- Error message -->
    <div th:if="${error}" class="alert alert-danger" th:text="${error}">
        Invalid credentials
    </div>

    <form th:action="@{/login}" action="/login" method="post">
        <div class="form-group">
            <label for="email">Username</label>
            <div class="input-wrapper">
                <span class="input-icon">👤</span>
                <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email" required>
            </div>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
                <span class="input-icon">🔒</span>
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>
        </div>

        <div class="checkbox-group">
            <label>
                <input type="checkbox" name="remember"> Remember me
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-login">Login</button>
    </form>

    <p class="register-link">
        Don't have an account? <a th:href="@{/register}" href="/register">Register</a>
    </p>
</div>
</body>
</html>
