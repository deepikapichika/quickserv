<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Main Service - QuickServ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #10002B; color: #fff; }
        .card-wrap { max-width: 860px; margin: 40px auto; }
        .card { background: rgba(22, 0, 50, 0.95); border: 1px solid rgba(224,170,255,0.2); }
        .form-label { color: #E0AAFF; }
        .hint { color: rgba(224,170,255,0.75); font-size: 0.9rem; }
        .toggle-box { background: rgba(255,255,255,0.04); border: 1px solid rgba(224,170,255,0.2); border-radius: 10px; padding: 14px; }
    </style>
</head>
<body>
<div class="container card-wrap">
    <div class="card shadow-lg">
        <div class="card-body p-4 p-md-5">
            <h3 class="mb-3">Add Main Service</h3>
            <p class="hint mb-4">Create your main service, then link one sub-service (existing or new).</p>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form method="post" action="/provider/offerings/add-main-service" id="mainServiceForm">
                <div class="mb-3">
                    <label class="form-label">Service Name (Business Name)</label>
                    <input type="text" class="form-control" name="serviceName" th:value="${serviceName}" placeholder="e.g., Eva Hair Studio" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <select class="form-select" id="categoryId" name="categoryId" required>
                        <option value="">Select category</option>
                        <option th:each="category : ${categories}"
                                th:value="${category.id}"
                                th:text="${category.name}"
                                th:selected="${selectedCategoryId != null and selectedCategoryId == category.id}"></option>
                    </select>
                    <div class="hint mt-1">Only fixed platform categories are available.</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Location</label>
                    <div class="input-group mb-2">
                        <input type="text" class="form-control" id="location" name="location" th:value="${location}" placeholder="Enter your service location" required>
                        <button class="btn btn-outline-secondary" type="button" id="geoBtn">Use My Location</button>
                    </div>
                    <div class="hint">You can type manually, or auto-fill using browser geolocation.</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Base Price</label>
                    <input type="number" class="form-control" name="basePrice" th:value="${basePrice}" min="1" step="0.01" placeholder="e.g., 499" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Image URL</label>
                    <input type="url" class="form-control" name="imageUrl" th:value="${imageUrl}" placeholder="https://example.com/image.jpg">
                </div>

                <div class="mb-4 toggle-box">
                    <label class="form-label d-block mb-2">Sub-Service Link</label>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="subServiceMode" id="modeExisting" value="existing" checked>
                        <label class="form-check-label" for="modeExisting">Select existing sub-service</label>
                    </div>
                    <div class="mb-3">
                        <select class="form-select" id="existingSubServiceId" name="existingSubServiceId">
                            <option value="">Select sub-service</option>
                        </select>
                    </div>

                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="subServiceMode" id="modeNew" value="new">
                        <label class="form-check-label" for="modeNew">Create new sub-service</label>
                    </div>
                    <div class="row g-2">
                        <div class="col-md-7">
                            <input type="text" class="form-control" id="newSubServiceName" name="newSubServiceName" th:value="${newSubServiceName}" placeholder="New sub-service name">
                        </div>
                        <div class="col-md-5">
                            <input type="number" class="form-control" id="newSubServicePrice" name="newSubServicePrice" th:value="${newSubServicePrice}" min="1" step="0.01" placeholder="Sub-service price">
                        </div>
                    </div>
                    <div class="hint mt-2">If no existing sub-service fits, create one and set its price.</div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Save Main Service</button>
                    <a href="/provider/services" class="btn btn-outline-light">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const geoBtn = document.getElementById('geoBtn');
    const locationInput = document.getElementById('location');
    const categorySelect = document.getElementById('categoryId');
    const existingSelect = document.getElementById('existingSubServiceId');
    const modeExisting = document.getElementById('modeExisting');
    const modeNew = document.getElementById('modeNew');
    const newName = document.getElementById('newSubServiceName');
    const newPrice = document.getElementById('newSubServicePrice');

    function applyMode() {
        const existing = modeExisting.checked;
        existingSelect.disabled = !existing;
        newName.disabled = existing;
        newPrice.disabled = existing;

        if (existing) {
            newName.value = '';
            newPrice.value = '';
        } else {
            existingSelect.value = '';
        }
    }

    async function loadSubServicesForCategory() {
        const categoryId = categorySelect.value;
        existingSelect.innerHTML = '<option value="">Select sub-service</option>';
        if (!categoryId) {
            return;
        }

        try {
            const resp = await fetch('/provider/offerings/sub-services-by-category?categoryId=' + encodeURIComponent(categoryId));
            const data = await resp.json();
            data.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item.id;
                opt.textContent = item.name;
                existingSelect.appendChild(opt);
            });
        } catch (e) {
            // Keep empty list when request fails.
        }
    }

    categorySelect.addEventListener('change', loadSubServicesForCategory);
    modeExisting.addEventListener('change', applyMode);
    modeNew.addEventListener('change', applyMode);

    geoBtn.addEventListener('click', function () {
        if (!navigator.geolocation) {
            alert('Geolocation is not supported by your browser.');
            return;
        }

        geoBtn.disabled = true;
        geoBtn.textContent = 'Detecting...';

        navigator.geolocation.getCurrentPosition(
            function (position) {
                const lat = position.coords.latitude.toFixed(6);
                const lng = position.coords.longitude.toFixed(6);
                locationInput.value = lat + ', ' + lng;
                geoBtn.disabled = false;
                geoBtn.textContent = 'Use My Location';
            },
            function () {
                alert('Could not fetch your location. Please enter manually.');
                geoBtn.disabled = false;
                geoBtn.textContent = 'Use My Location';
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
    });

    applyMode();
    loadSubServicesForCategory();
</script>
</body>
</html>
