<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Bookings - Provider - QuickServ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Manage Bookings</h2>

    <div th:if="${stats}" class="row mb-4">
        <div class="col-md-3">
            <div class="card">
                <div class="card-body text-center">
                    <h6 class="card-title">Total Bookings</h6>
                    <h3 th:text="${stats.totalBookings}">0</h3>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card">
                <div class="card-body text-center">
                    <h6 class="card-title">Pending</h6>
                    <h3 th:text="${stats.pendingBookings}">0</h3>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card">
                <div class="card-body text-center">
                    <h6 class="card-title">Today's Bookings</h6>
                    <h3 th:text="${stats.todaysBookings}">0</h3>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card">
                <div class="card-body text-center">
                    <h6 class="card-title">Upcoming</h6>
                    <h3 th:text="${stats.upcomingBookings}">0</h3>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${bookings.isEmpty()}" class="alert alert-info">
        You don't have any bookings yet.
    </div>

    <div th:if="${!bookings.isEmpty()}">
        <div class="card mb-3" th:each="booking : ${bookings}">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-8">
                        <h5 th:text="${booking.service.title}"></h5>
                        <p><strong>Customer:</strong> <span th:text="${booking.customer.name}"></span> (<span th:text="${booking.customer.email}"></span>)</p>
                        <p><strong>Date & Time:</strong> <span th:text="${#temporals.format(booking.bookingDateTime, 'dd MMM yyyy, hh:mm a')}"></span></p>
                        <p><strong>Amount:</strong> ₹<span th:text="${booking.totalAmount}"></span></p>
                        <p th:if="${booking.customerNotes}"><strong>Customer Notes:</strong> <span th:text="${booking.customerNotes}"></span></p>
                    </div>
                    <div class="col-md-4 text-end">
                        <span class="badge"
                              th:classappend="${booking.status == T(com.quickserv.quickserv.entity.Booking.BookingStatus).PENDING} ? 'bg-warning' :
                                             ${booking.status == T(com.quickserv.quickserv.entity.Booking.BookingStatus).CONFIRMED} ? 'bg-info' :
                                             ${booking.status == T(com.quickserv.quickserv.entity.Booking.BookingStatus).COMPLETED} ? 'bg-success' :
                                             ${booking.status == T(com.quickserv.quickserv.entity.Booking.BookingStatus).CANCELLED} ? 'bg-secondary' : 'bg-danger'"
                              th:text="${booking.status}"></span>

                        <div class="mt-3">
                            <a th:href="@{/bookings/{id}(id=${booking.id})}" class="btn btn-sm btn-info">View Details</a>

                            <div class="mt-2">
                                <form th:action="@{/bookings/provider/update-status}" method="post">
                                    <input type="hidden" name="bookingId" th:value="${booking.id}">
                                    <select name="status" class="form-select form-select-sm mb-2" required>
                                        <option value="">Select Status</option>
                                        <option value="CONFIRMED">Confirm</option>
                                        <option value="IN_PROGRESS">In Progress</option>
                                        <option value="COMPLETED">Complete</option>
                                        <option value="CANCELLED">Cancel</option>
                                        <option value="REJECTED">Reject</option>
                                    </select>
                                    <textarea name="providerNotes" class="form-control form-control-sm mb-2"
                                              placeholder="Add notes..." rows="2"></textarea>
                                    <button type="submit" class="btn btn-primary btn-sm w-100">Update Status</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
