<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Sub-Service - QuickServ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #10002B; min-height: 100vh; padding-top: 80px; }
    .background-img { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; opacity: 0.2; pointer-events: none; }
    .navbar { background: rgba(16, 0, 43, 0.95) !important; border-bottom: 1px solid rgba(224, 170, 255, 0.2); padding: 15px 0; position: fixed; width: 100%; top: 0; z-index: 1000; }
    .nav-container { max-width: 1400px; margin: 0 auto; padding: 0 50px; display: flex; justify-content: space-between; align-items: center; }
    .logo { color: white; text-decoration: none; font-size: 24px; font-weight: 700; text-shadow: 0 0 10px rgba(224, 170, 255, 0.5); }
    .nav-links { display: flex; gap: 34px; align-items: center; }
    .nav-links a { color: white; text-decoration: none; font-size: 15px; font-weight: 500; }
    .nav-links a:hover { color: #E0AAFF; }
    .main-content { padding: 0 50px 50px; max-width: 900px; margin: 0 auto; }
    .page-header { margin: 20px 0 24px; }
    .page-header h1 { color: #E0AAFF; font-size: 32px; margin-bottom: 8px; }
    .page-header p { color: rgba(224, 170, 255, 0.75); }
    .form-card { background: rgba(22, 0, 50, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(224, 170, 255, 0.2); border-radius: 16px; padding: 24px; }
    .form-label { color: #E0AAFF; font-size: 13px; font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.4px; }
    .form-control, .form-select { background: rgba(16, 0, 43, 0.7); border: 1px solid rgba(224, 170, 255, 0.3); color: white; border-radius: 10px; }
    .form-control:focus, .form-select:focus { border-color: #7B2CBF; box-shadow: 0 0 0 3px rgba(123, 44, 191, 0.3); background: rgba(16, 0, 43, 0.9); color: white; }
    .form-select option { background: #10002B; color: white; }
    .readonly-input { background: rgba(36, 8, 64, 0.85) !important; color: rgba(224, 170, 255, 0.8) !important; }
    .availability-toggle { display: flex; align-items: center; gap: 10px; color: #E0AAFF; margin-top: 6px; }
    .availability-toggle input { width: 18px; height: 18px; }
    .actions { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-primary-custom { background: linear-gradient(135deg, #5A189A, #7B2CBF); border: none; color: white; padding: 10px 18px; border-radius: 8px; font-weight: 600; }
    .btn-secondary-custom { background: rgba(224, 170, 255, 0.2); border: 1px solid #7B2CBF; color: #E0AAFF; padding: 10px 18px; border-radius: 8px; font-weight: 600; text-decoration: none; }
    .alert { border: none; border-radius: 10px; }
    @media (max-width: 768px) {
      .nav-container { padding: 0 20px; }
      .main-content { padding: 0 20px 32px; }
      .nav-links { gap: 18px; }
    }
  </style>
</head>
<body>
<img src="https://images.unsplash.com/photo-1528756514091-dee5ecaa3278?q=80&w=687&auto=format&fit=crop" class="background-img" alt="Background">

<nav class="navbar">
  <div class="nav-container">
    <a href="/" class="logo">QuickServ</a>
    <div class="nav-links">
      <a href="/provider/dashboard">Dashboard</a>
      <a href="/provider/services">Services</a>
      <a href="/provider/offerings">Sub-Services</a>
      <a href="/provider/locations">Locations</a>
      <a href="/logout">Logout</a>
    </div>
  </div>
</nav>

<div class="main-content">
  <div class="page-header">
    <h1>Edit Sub-Service</h1>
    <p>Update sub-service pricing, availability, and details.</p>
  </div>

  <div class="form-card">
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <form method="post" th:action="@{'/provider/offerings/edit/' + ${offering.id}}">
      <div class="mb-3">
        <label class="form-label">Sub-Service</label>
        <input class="form-control readonly-input" th:value="${offering.subService.name}" readonly>
      </div>

      <div class="mb-3">
        <label class="form-label">Price</label>
        <input class="form-control" type="number" step="0.01" name="price" th:value="${offering.price}" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Price Unit</label>
        <select class="form-select" name="priceUnit" required>
          <option value="per hour" th:selected="${offering.priceUnit == 'per hour'}">per hour</option>
          <option value="per visit" th:selected="${offering.priceUnit == 'per visit'}">per visit</option>
          <option value="fixed" th:selected="${offering.priceUnit == 'fixed'}">fixed</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Description (optional)</label>
        <textarea class="form-control" name="description" rows="3" th:text="${offering.description}"></textarea>
      </div>

      <input type="hidden" name="isAvailable" value="false">
      <div class="availability-toggle">
        <input type="checkbox" name="isAvailable" value="true" id="isAvailable" th:checked="${offering.isAvailable}">
        <label for="isAvailable">Available for booking</label>
      </div>

      <div class="actions">
        <button class="btn btn-primary-custom" type="submit"><i class="fas fa-save"></i> Update</button>
        <a href="/provider/offerings" class="btn-secondary-custom"><i class="fas fa-arrow-left"></i> Back</a>
      </div>
    </form>
  </div>
</div>
</body>
</html>
