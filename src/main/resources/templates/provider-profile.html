<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Provider Profile - QuickServ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #10002B;
      min-height: 100vh;
      padding-top: 80px;
    }

    .background-img {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: -1;
      opacity: 0.2;
      pointer-events: none;
    }

    .navbar {
      background: rgba(16, 0, 43, 0.95) !important;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(224, 170, 255, 0.2);
      padding: 15px 0;
      position: fixed;
      width: 100%;
      top: 0;
      left: 0;
      z-index: 1000;
    }

    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .logo {
      color: white;
      text-decoration: none;
      font-size: 24px;
      font-weight: 700;
      text-shadow: 0 0 10px rgba(224, 170, 255, 0.5);
    }

    .nav-links { display: flex; gap: 40px; align-items: center; }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
      transition: color 0.3s;
      padding: 8px 0;
    }

    .nav-links a:hover { color: #E0AAFF; }

    .main-content {
      padding: 0 50px 50px;
      max-width: 1000px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .page-header { margin: 20px 0 25px; }

    .page-header h1 {
      color: #E0AAFF;
      font-size: 32px;
      margin-bottom: 8px;
    }

    .page-header p { color: rgba(224, 170, 255, 0.75); }

    .form-card {
      background: rgba(22, 0, 50, 0.9);
      border: 1px solid rgba(224, 170, 255, 0.2);
      border-radius: 16px;
      padding: 28px;
      backdrop-filter: blur(10px);
    }

    .form-label {
      color: #E0AAFF;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .form-control, .form-select {
      background: rgba(16, 0, 43, 0.65);
      border: 1px solid rgba(224, 170, 255, 0.3);
      color: white;
      border-radius: 10px;
      padding: 11px 14px;
    }

    .form-control:focus, .form-select:focus {
      background: rgba(16, 0, 43, 0.85);
      color: white;
      border-color: #7B2CBF;
      box-shadow: 0 0 0 3px rgba(123, 44, 191, 0.3);
    }

    .form-select option { background: #10002B; color: white; }

    .profile-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .full-width { grid-column: 1 / -1; }

    .readonly {
      background: rgba(36, 8, 64, 0.8) !important;
      color: rgba(224, 170, 255, 0.75) !important;
    }

    .alert {
      border-radius: 10px;
      margin-bottom: 16px;
      border: none;
    }

    .actions {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-primary-custom {
      border: none;
      background: linear-gradient(135deg, #5A189A, #7B2CBF);
      color: white;
      padding: 11px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
    }

    .btn-secondary-custom {
      border: 1px solid #7B2CBF;
      background: rgba(224, 170, 255, 0.2);
      color: #E0AAFF;
      padding: 11px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .nav-container { padding: 0 20px; }
      .nav-links { gap: 18px; }
      .nav-links a { font-size: 14px; }
      .main-content { padding: 0 20px 30px; }
      .profile-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<img src="https://images.unsplash.com/photo-1528756514091-dee5ecaa3278?q=80&w=687&auto=format&fit=crop" class="background-img" alt="Background">

<nav class="navbar">
  <div class="nav-container">
    <a href="/" class="logo">QuickServ</a>
    <div class="nav-links">
      <a href="/provider/dashboard">Dashboard</a>
      <a href="/provider/services">My Services</a>
      <a href="/browse">Browse</a>
      <a href="/logout">Logout</a>
    </div>
  </div>
</nav>

<div class="main-content">
  <div class="page-header">
    <h1>Provider Profile</h1>
    <p>Keep your profile complete so customers can trust and book you faster.</p>
  </div>

  <div class="form-card">
    <div th:if="${success}" class="alert alert-success" th:text="${success}">Profile updated successfully.</div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}">Unable to update profile.</div>

    <form th:action="@{/provider/profile}" th:object="${provider}" method="post">
      <div class="profile-grid">
        <div>
          <label class="form-label">Name</label>
          <input type="text" th:field="*{name}" class="form-control" required>
        </div>

        <div>
          <label class="form-label">Email</label>
          <input type="email" th:value="*{email}" class="form-control readonly" readonly>
        </div>

        <div>
          <label class="form-label">Location</label>
          <input type="text" th:field="*{location}" class="form-control" required>
        </div>

        <div>
          <label class="form-label">Primary Service Type</label>
          <select th:field="*{serviceType}" class="form-select" required>
            <option value="" disabled>Select Service Type</option>
            <option th:each="cat : ${categories}" th:value="${cat.name}" th:text="${@categoryService.toDisplayCategoryName(cat.name)}"></option>
          </select>
        </div>

        <div>
          <label class="form-label">Experience (Years)</label>
          <input type="number" min="0" max="60" th:field="*{experienceYears}" class="form-control" placeholder="e.g., 5">
        </div>

        <div>
          <label class="form-label">Service Area</label>
          <input type="text" th:field="*{serviceArea}" class="form-control" placeholder="e.g., South Bangalore, Whitefield">
        </div>

        <div>
          <label class="form-label">Availability Days</label>
          <input type="text" th:field="*{availabilityDays}" class="form-control" placeholder="e.g., Mon-Sat">
        </div>

        <div>
          <label class="form-label">Availability Time Slots</label>
          <input type="text" th:field="*{availabilityTimeSlots}" class="form-control" placeholder="e.g., 09:00 AM - 07:00 PM">
        </div>

        <div class="full-width">
          <label class="form-label">Profile Photo URL</label>
          <input type="url" th:field="*{profilePhotoUrl}" class="form-control" placeholder="https://example.com/provider-photo.jpg">
        </div>

        <div class="full-width">
          <label class="form-label">Professional Description</label>
          <textarea th:field="*{providerDescription}" class="form-control" rows="4" placeholder="Describe your expertise, certifications, and service quality..."></textarea>
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary-custom" type="submit"><i class="fas fa-save"></i> Save Profile</button>
        <a href="/provider/dashboard" class="btn-secondary-custom"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
