<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - QuickServ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            background: linear-gradient(180deg, #6a2d91 0%, #5a1f7d 50%, #4a1570 100%);
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 24px 0;
        }

        /* Starry background */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                    radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                    radial-gradient(2px 2px at 60px 70px, #fff, rgba(0,0,0,0)),
                    radial-gradient(1px 1px at 50px 50px, #fff, rgba(0,0,0,0)),
                    radial-gradient(1px 1px at 130px 80px, #fff, rgba(0,0,0,0)),
                    radial-gradient(2px 2px at 90px 10px, #fff, rgba(0,0,0,0)),
                    radial-gradient(2px 2px at 130px 140px, #eee, rgba(0,0,0,0)),
                    radial-gradient(1px 1px at 200px 140px, #fff, rgba(0,0,0,0)),
                    radial-gradient(1px 1px at 130px 180px, #fff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: twinkle 5s ease-in-out infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Forest background - entire width */
        body::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            height: 55%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" preserveAspectRatio="none"><defs><linearGradient id="forestGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:rgba(40,15,60,0);stop-opacity:1" /><stop offset="40%" style="stop-color:rgba(30,10,50,0.4);stop-opacity:1" /><stop offset="100%" style="stop-color:rgba(15,5,25,1);stop-opacity:1" /></linearGradient></defs><g fill="url(%23forestGrad)"><polygon points="0,250 30,150 60,250 100,100 140,250 180,120 220,250 260,140 300,250 340,110 380,250 420,130 460,250 500,100 540,250 580,140 620,250 660,120 700,250 740,150 780,250 820,100 860,250 900,130 940,250 980,120 1020,250 1060,150 1100,250 1140,110 1200,250"/></g></svg>') no-repeat bottom;
            background-size: cover;
            background-position: bottom;
            pointer-events: none;
            z-index: 2;
        }

        .register-container {
            background: rgba(100, 40, 150, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 35px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .provider-only {
            display: none;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #e0d5ff;
            margin-bottom: 8px;
            text-transform: capitalize;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-control {
            width: 100%;
            padding: 14px 18px 14px 45px;
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        .form-control:focus {
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 10px rgba(200, 100, 255, 0.3);
        }

        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='rgba(255,255,255,0.6)' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
            background-repeat: no-repeat;
            background-position: right 18px center;
            background-size: 16px;
            padding-right: 45px;
        }

        select.form-control option {
            background: #6a2d91;
            color: #fff;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 18px;
        }

        .password-field {
            padding-right: 90px;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 6px;
        }

        .password-toggle:hover,
        .password-toggle:focus {
            background: rgba(255, 255, 255, 0.15);
            outline: none;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: #fff;
            color: #6a2d91;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin: 15px 0 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-register:active {
            transform: translateY(0);
        }

        .login-link {
            text-align: center;
            color: #e0d5ff;
            font-size: 14px;
        }

        .login-link a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .login-link a:hover {
            color: #ffeb3b;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid;
        }

        .alert-danger {
            background: rgba(244, 67, 54, 0.2);
            color: #ff9999;
            border-color: rgba(244, 67, 54, 0.5);
        }

        .field-hint {
            display: block;
            margin-top: 8px;
            font-size: 12px;
            color: #e0d5ff;
            line-height: 1.4;
        }

        @media (max-width: 480px) {
            .register-container {
                padding: 35px;
                margin: 20px;
            }

            h1 {
                font-size: 28px;
                margin-bottom: 25px;
            }

            .form-control {
                padding: 12px 15px 12px 40px;
            }

            body {
                padding: 16px 0;
            }
        }
    </style>
</head>
<body>
<div class="register-container">
    <h1>Create Account</h1>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}">
        Error message
    </div>

    <form action="/register" method="post">
        <div class="form-group">
            <label>Username</label>
            <div class="input-wrapper">
                <span class="input-icon">👤</span>
                <input type="text" name="name" class="form-control" placeholder="Enter your username" required>
            </div>
        </div>

        <div class="form-group">
            <label>Email</label>
            <div class="input-wrapper">
                <span class="input-icon">📧</span>
                <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="input-wrapper">
                <span class="input-icon">🔒</span>
                <input type="password"
                       id="passwordInput"
                       name="password"
                       class="form-control password-field"
                       placeholder="Create a password"
                       minlength="8"
                       pattern="(?=.*[A-Z])(?=.*[a-z])(?=.*[0-9])[A-Za-z0-9@_]{8,}"
                       title="Use at least 8 characters with uppercase, lowercase, and a number. Only @ and _ are allowed as special characters."
                       required>
                <button type="button" id="togglePasswordBtn" class="password-toggle" aria-label="Show password">Show</button>
            </div>
            <small class="field-hint">Minimum 8 characters. Must include A-Z, a-z, and 0-9. Allowed special characters: @ and _ only.</small>
        </div>

        <div class="form-group">
            <label>Location</label>
            <div class="input-wrapper">
                <span class="input-icon">📍</span>
                <input type="text" name="location" class="form-control" placeholder="Enter your location" required>
            </div>
        </div>

        <div class="form-group">
            <label>I want to</label>
            <div class="input-wrapper">
                <span class="input-icon">⚙️</span>
                <select id="roleSelect" name="role" class="form-control" required>
                    <option value="" disabled selected>Select account type</option>
                    <option value="CUSTOMER">Find Services (Customer)</option>
                    <option value="PROVIDER">Offer Services (Provider)</option>
                </select>
            </div>
        </div>

        <div id="providerServiceGroup" class="form-group provider-only">
            <label>Type of Service You Provide</label>
            <div class="input-wrapper">
                <span class="input-icon">🛠️</span>
                <select id="serviceTypeSelect" name="serviceType" class="form-control">
                    <option value="" selected>Select a service type</option>
                    <option th:each="category : ${categories}"
                            th:value="${category.name}"
                            th:text="${@categoryService.toDisplayCategoryName(category.name)}">
                    </option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn-register">Register</button>
    </form>

    <p class="login-link">
        Already have an account? <a href="/login">Login</a>
    </p>
</div>

<script>
    const roleSelect = document.getElementById('roleSelect');
    const providerServiceGroup = document.getElementById('providerServiceGroup');
    const serviceTypeSelect = document.getElementById('serviceTypeSelect');
    const passwordInput = document.getElementById('passwordInput');
    const togglePasswordBtn = document.getElementById('togglePasswordBtn');

    function toggleProviderFields() {
        const isProvider = roleSelect.value === 'PROVIDER';
        providerServiceGroup.style.display = isProvider ? 'block' : 'none';
        serviceTypeSelect.required = isProvider;
        if (!isProvider) {
            serviceTypeSelect.value = '';
        }
    }

    if (passwordInput && togglePasswordBtn) {
        togglePasswordBtn.addEventListener('click', function () {
            const showingPassword = passwordInput.type === 'text';
            passwordInput.type = showingPassword ? 'password' : 'text';
            togglePasswordBtn.textContent = showingPassword ? 'Show' : 'Hide';
            togglePasswordBtn.setAttribute('aria-label', showingPassword ? 'Show password' : 'Hide password');
        });
    }

    roleSelect.addEventListener('change', toggleProviderFields);
    toggleProviderFields();
</script>
</body>
</html>
