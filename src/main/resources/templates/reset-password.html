<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - QuickServ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #6a2d91 0%, #5a1f7d 50%, #4a1570 100%);
            padding: 20px;
        }
        .card {
            width: 100%;
            max-width: 430px;
            background: rgba(100, 40, 150, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            padding: 36px;
            color: #fff;
        }
        h1 { text-align: center; margin-bottom: 22px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; color: #e0d5ff; }
        input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.35);
            background: rgba(255,255,255,0.12);
            color: #fff;
            outline: none;
        }
        input::placeholder { color: rgba(255,255,255,0.65); }
        .hint { display: block; margin-top: 8px; color: #e0d5ff; font-size: 12px; line-height: 1.4; }
        .btn {
            width: 100%;
            border: none;
            border-radius: 999px;
            padding: 12px;
            font-weight: 700;
            color: #6a2d91;
            background: #fff;
            cursor: pointer;
            margin-top: 8px;
        }
        .alert {
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 14px;
            font-size: 14px;
            border: 1px solid;
        }
        .alert-danger {
            background: rgba(244, 67, 54, 0.2);
            color: #ff9999;
            border-color: rgba(244, 67, 54, 0.5);
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Reset Password</h1>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}">Reset failed.</div>

    <form action="/reset-password" method="post">
        <input type="hidden" name="token" th:value="${token}">

        <div class="form-group">
            <label for="password">New Password</label>
            <input type="password"
                   id="password"
                   name="password"
                   minlength="8"
                   pattern="(?=.*[A-Z])(?=.*[a-z])(?=.*[0-9])[A-Za-z0-9@_]{8,}"
                   title="Use at least 8 characters with uppercase, lowercase, and a number. Only @ and _ are allowed as special characters."
                   required>
            <small class="hint">Minimum 8 characters with uppercase, lowercase, and number. Allowed special characters: @ and _ only.</small>
        </div>

        <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required>
        </div>

        <button class="btn" type="submit">Reset Password</button>
    </form>
</div>
</body>
</html>
