<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Service - QuickServ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Hide scrollbars (scroll still works) */
    *::-webkit-scrollbar { width: 0; height: 0; background: transparent; }
    *::-webkit-scrollbar-thumb { background: transparent; }
    *::-webkit-scrollbar-track { background: transparent; }
    * { scrollbar-width: none; -ms-overflow-style: none; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #10002B;
      min-height: 100vh;
      padding-top: 80px;
    }

    /* Background image */
    .background-img {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: -1;
      opacity: 0.2;
      pointer-events: none;
    }

    /* Navbar - matching provider dashboard */
    .navbar {
      background: rgba(16, 0, 43, 0.95) !important;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(224, 170, 255, 0.2);
      padding: 15px 0;
      position: fixed;
      width: 100%;
      top: 0;
      left: 0;
      z-index: 1000;
    }

    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .logo {
      color: white;
      text-decoration: none;
      font-size: 24px;
      font-weight: 700;
      text-shadow: 0 0 10px rgba(224, 170, 255, 0.5);
    }

    .nav-links {
      display: flex;
      gap: 40px;
      align-items: center;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
      transition: color 0.3s;
      padding: 8px 0;
    }

    .nav-links a:hover {
      color: #E0AAFF;
    }

    .nav-links .logout-link {
      background: none;
      padding: 8px 0;
      margin: 0;
    }

    /* Main Content */
    .main-content {
      padding: 0 50px 50px;
      max-width: 800px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* Page Header */
    .page-header {
      margin-bottom: 30px;
    }

    .page-header h1 {
      color: #E0AAFF;
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .page-header p {
      color: rgba(224, 170, 255, 0.7);
      font-size: 16px;
    }

    /* Form Card */
    .form-card {
      background: rgba(22, 0, 50, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(224, 170, 255, 0.2);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .form-group {
      margin-bottom: 25px;
    }

    .form-label {
      display: block;
      color: #E0AAFF;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-control, .form-select {
      width: 100%;
      padding: 12px 16px;
      background: rgba(16, 0, 43, 0.6);
      border: 1px solid rgba(224, 170, 255, 0.3);
      border-radius: 10px;
      color: #ffffff;
      font-size: 15px;
      transition: all 0.3s;
    }

    .form-control:focus, .form-select:focus,
    .form-control:hover, .form-select:hover,
    input.form-control:focus, textarea.form-control:focus, select.form-select:focus {
      outline: none;
      border-color: #7B2CBF;
      box-shadow: 0 0 0 3px rgba(123, 44, 191, 0.3);
      background: rgba(16, 0, 43, 0.8);
      color: #ffffff;
      caret-color: #ffffff;
    }

    .form-control::placeholder,
    textarea.form-control::placeholder,
    input.form-control::placeholder {
      color: rgba(224, 170, 255, 0.65);
      opacity: 1;
    }

    textarea.form-control,
    textarea.form-control:focus {
      color: #ffffff;
      caret-color: #ffffff;
    }

    textarea.form-control::placeholder {
      color: rgba(224, 170, 255, 0.55);
    }

    .form-select option {
      background: #5a189a;
      color: white;
    }

    .form-select option:hover {
      background: #7b2cbf;
      color: white;
    }

    .form-select option:checked {
      background: #9d4edd;
      color: white;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 0;
    }

    /* Action Buttons */
    .action-buttons {
      display: flex;
      gap: 15px;
      margin-top: 30px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #5A189A, #7B2CBF);
      color: white;
      padding: 12px 30px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s;
      border: none;
      cursor: pointer;
      flex: 1;
      justify-content: center;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(123, 44, 191, 0.5);
    }

    .btn-secondary {
      background: rgba(224, 170, 255, 0.2);
      border: 1px solid #7B2CBF;
      color: #E0AAFF;
      padding: 12px 30px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s;
      flex: 1;
      justify-content: center;
    }

    .btn-secondary:hover {
      background: rgba(123, 44, 191, 0.3);
      color: white;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .nav-container {
        padding: 0 20px;
      }

      .nav-links {
        gap: 20px;
      }

      .nav-links a {
        font-size: 14px;
      }

      .main-content {
        padding: 0 20px 30px;
      }

      .form-card {
        padding: 25px;
      }

      .row {
        grid-template-columns: 1fr;
        gap: 15px;
      }

      .action-buttons {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
<!-- Background Image -->
<img src="https://images.unsplash.com/photo-1528756514091-dee5ecaa3278?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" class="background-img" alt="Background">

<!-- Navbar -->
<nav class="navbar">
  <div class="nav-container">
    <a href="/" class="logo">QuickServ</a>
    <div class="nav-links">
      <a href="/provider/services">My Services</a>
      <a href="/provider/dashboard">Dashboard</a>
      <a href="/browse">Browse</a>
      <a href="/logout" class="logout-link">Logout</a>
    </div>
  </div>
</nav>

<!-- Main Content -->
<div class="main-content">
  <!-- Page Header -->
  <div class="page-header">
    <h1>Add New Service</h1>
    <p>List your service to reach more customers</p>
  </div>

  <!-- Form Card -->
  <div class="form-card">
    <form id="addServiceForm" th:action="@{/provider/add-service}" action="/provider/add-service" th:object="${service}" method="post">
      <!-- Category -->
      <div class="form-group">
        <label class="form-label">Category</label>
        <select id="categoryId" name="categoryId" class="form-select" required>
          <option value="" disabled th:selected="${providerCategoryId == null}">Select Category</option>
          <option th:each="cat : ${categories}"
                  th:value="${cat.id}"
                  th:text="${cat.name} + ' ' + ${cat.iconUrl}"
                  th:selected="${providerCategoryId != null and cat.id == providerCategoryId}"></option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Subcategory</label>
        <select id="subcategoryId" name="subcategoryId" class="form-select" required>
          <option value="" disabled selected>Select Subcategory</option>
          <option th:each="sub : ${subcategories}"
                  th:value="${sub.id}"
                  th:text="${sub.name}"></option>
        </select>
      </div>

      <!-- Service Title -->
      <div class="form-group">
        <label class="form-label">Service Title (optional)</label>
        <input type="text" name="title" class="form-control"
               placeholder="Will use subcategory name if left blank">
      </div>

      <!-- Description -->
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="4"
                  placeholder="Describe your service in detail..."></textarea>
      </div>

      <!-- Price and Unit Row -->
      <div class="row">
        <div class="form-group">
          <label class="form-label">Price</label>
          <input type="number" name="price" step="0.01" class="form-control"
                 placeholder="500" required>
        </div>

        <div class="form-group">
          <label class="form-label">Price Unit</label>
          <select name="priceUnit" class="form-select" required>
            <option value="per hour">per hour</option>
            <option value="per visit">per visit</option>
            <option value="fixed">fixed price</option>
          </select>
        </div>
      </div>

      <!-- Location -->
      <div class="form-group">
        <label class="form-label">Service Locations</label>
        <input type="text" name="location" class="form-control"
               placeholder="e.g., Mumbai, Delhi, Pune" required>
        <small style="color: rgba(224,170,255,0.7);">Use comma-separated locations. Customers can find this service from any matching location.</small>
      </div>

      <!-- Image URL (Optional) -->
      <div class="form-group">
        <label class="form-label">Image URL (optional)</label>
        <input type="text" name="imageUrl" class="form-control"
               placeholder="https://example.com/image.jpg">
      </div>

      <div class="form-group">
        <label class="form-label">Available Time</label>
        <input type="text" name="availableTime" class="form-control"
               placeholder="e.g., Mon-Sat 9AM-7PM" required>
      </div>

      <div class="row">
        <div class="form-group">
          <label class="form-label">Discount % (optional)</label>
          <input type="number" name="discountPercent" step="0.01" min="0" max="100" class="form-control"
                 placeholder="10">
        </div>

        <div class="form-group">
          <label class="form-label">Coupon (optional)</label>
          <input type="text" name="couponCode" class="form-control"
                 placeholder="SAVE10">
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="action-buttons">
        <button type="submit" class="btn-primary">
          <i class="fas fa-plus-circle"></i> Add Service
        </button>
        <a href="/provider/services" class="btn-secondary">
          <i class="fas fa-times"></i> Cancel
        </a>
      </div>
    </form>
  </div>
</div>

<script>
  const categorySelect = document.getElementById('categoryId');
  const subcategorySelect = document.getElementById('subcategoryId');
  const addServiceForm = document.getElementById('addServiceForm');

  async function loadSubcategoriesByCategory(categoryId) {
    if (!categoryId) {
      subcategorySelect.innerHTML = '<option value="" disabled selected>Select Subcategory</option>';
      return;
    }

    try {
      const response = await fetch(`/subcategories/by-category/${categoryId}`, {headers: {'Accept': 'application/json'}});
      if (!response.ok) {
        throw new Error('Unable to load subcategories');
      }

      const items = await response.json();
      subcategorySelect.innerHTML = '<option value="" disabled selected>Select Subcategory</option>';
      items.forEach(item => {
        const option = document.createElement('option');
        option.value = String(item.id);
        option.textContent = item.name;
        subcategorySelect.appendChild(option);
      });
    } catch (err) {
      subcategorySelect.innerHTML = '<option value="" disabled selected>Unable to load subcategories</option>';
    }
  }

  categorySelect.addEventListener('change', () => {
    loadSubcategoriesByCategory(categorySelect.value);
  });

  if (categorySelect.value) {
    loadSubcategoriesByCategory(categorySelect.value);
  }

  // Ensure Add Service submit is triggered reliably and data is posted correctly.
  addServiceForm.addEventListener('submit', async (event) => {
    event.preventDefault();

    if (!addServiceForm.checkValidity()) {
      addServiceForm.reportValidity();
      return;
    }

    const submitButton = addServiceForm.querySelector('button[type="submit"]');
    if (submitButton) {
      submitButton.disabled = true;
    }

    try {
      const formData = new FormData(addServiceForm);
      const encoded = new URLSearchParams();
      for (const [key, value] of formData.entries()) {
        encoded.append(key, String(value));
      }

      const response = await fetch(addServiceForm.action, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8',
          'X-Requested-With': 'XMLHttpRequest'
        },
        body: encoded.toString(),
        credentials: 'same-origin',
        redirect: 'follow'
      });

      if (response.redirected) {
        window.location.href = response.url;
        return;
      }

      if (response.ok) {
        window.location.href = '/provider/services';
        return;
      }

      console.error('Add Service request failed with status:', response.status);
      addServiceForm.submit();
    } catch (error) {
      console.error('Add Service request error:', error);
      addServiceForm.submit();
    } finally {
      if (submitButton) {
        submitButton.disabled = false;
      }
    }
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
