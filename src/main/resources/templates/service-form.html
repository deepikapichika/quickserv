<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Service - QuickServ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #10002B;
      min-height: 100vh;
      padding-top: 80px;
    }

    /* Background image */
    .background-img {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: -1;
      opacity: 0.2;
      pointer-events: none;
    }

    /* Navbar - matching provider dashboard */
    .navbar {
      background: rgba(16, 0, 43, 0.95) !important;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(224, 170, 255, 0.2);
      padding: 15px 0;
      position: fixed;
      width: 100%;
      top: 0;
      left: 0;
      z-index: 1000;
    }

    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .logo {
      color: white;
      text-decoration: none;
      font-size: 24px;
      font-weight: 700;
      text-shadow: 0 0 10px rgba(224, 170, 255, 0.5);
    }

    .nav-links {
      display: flex;
      gap: 40px;
      align-items: center;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
      transition: color 0.3s;
      padding: 8px 0;
    }

    .nav-links a:hover {
      color: #E0AAFF;
    }

    .nav-links .logout-link {
      background: none;
      padding: 8px 0;
      margin: 0;
    }

    /* Main Content */
    .main-content {
      padding: 0 50px 50px;
      max-width: 800px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* Page Header */
    .page-header {
      margin-bottom: 30px;
    }

    .page-header h1 {
      color: #E0AAFF;
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .page-header p {
      color: rgba(224, 170, 255, 0.7);
      font-size: 16px;
    }

    /* Form Card */
    .form-card {
      background: rgba(22, 0, 50, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(224, 170, 255, 0.2);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .form-group {
      margin-bottom: 25px;
    }

    .form-label {
      display: block;
      color: #E0AAFF;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-control, .form-select {
      width: 100%;
      padding: 12px 16px;
      background: rgba(16, 0, 43, 0.6);
      border: 1px solid rgba(224, 170, 255, 0.3);
      border-radius: 10px;
      color: white;
      font-size: 15px;
      transition: all 0.3s;
    }

    .form-control:focus, .form-select:focus {
      outline: none;
      border-color: #7B2CBF;
      box-shadow: 0 0 0 3px rgba(123, 44, 191, 0.3);
      background: rgba(16, 0, 43, 0.8);
    }

    .form-control::placeholder {
      color: rgba(224, 170, 255, 0.4);
    }

    .form-select option {
      background: #10002B;
      color: white;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 0;
    }

    /* Action Buttons */
    .action-buttons {
      display: flex;
      gap: 15px;
      margin-top: 30px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #5A189A, #7B2CBF);
      color: white;
      padding: 12px 30px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s;
      border: none;
      cursor: pointer;
      flex: 1;
      justify-content: center;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(123, 44, 191, 0.5);
    }

    .btn-secondary {
      background: rgba(224, 170, 255, 0.2);
      border: 1px solid #7B2CBF;
      color: #E0AAFF;
      padding: 12px 30px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s;
      flex: 1;
      justify-content: center;
    }

    .btn-secondary:hover {
      background: rgba(123, 44, 191, 0.3);
      color: white;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .nav-container {
        padding: 0 20px;
      }

      .nav-links {
        gap: 20px;
      }

      .nav-links a {
        font-size: 14px;
      }

      .main-content {
        padding: 0 20px 30px;
      }

      .form-card {
        padding: 25px;
      }

      .row {
        grid-template-columns: 1fr;
        gap: 15px;
      }

      .action-buttons {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
<!-- Background Image -->
<img src="https://images.unsplash.com/photo-1528756514091-dee5ecaa3278?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" class="background-img" alt="Background">

<!-- Navbar -->
<nav class="navbar">
  <div class="nav-container">
    <a href="/" class="logo">QuickServ</a>
    <div class="nav-links">
      <a href="/provider/services">My Services</a>
      <a href="/provider/dashboard">Dashboard</a>
      <a href="/browse">Browse</a>
      <a href="/logout" class="logout-link">Logout</a>
    </div>
  </div>
</nav>

<!-- Main Content -->
<div class="main-content">
  <!-- Page Header -->
  <div class="page-header">
    <h1>Add New Service</h1>
    <p>List your service to reach more customers</p>
  </div>

  <!-- Form Card -->
  <div class="form-card">
    <form th:action="@{/provider/services/save}" th:object="${service}" method="post">
      <!-- Category -->
      <div class="form-group">
        <label class="form-label">Category</label>
        <select name="categoryId" class="form-select" required>
          <option value="" disabled selected>Select Category</option>
          <option th:each="cat : ${categories}"
                  th:value="${cat.id}"
                  th:text="${cat.name} + ' ' + ${cat.iconUrl}"></option>
        </select>
      </div>

      <!-- Service Title -->
      <div class="form-group">
        <label class="form-label">Service Title</label>
        <input type="text" name="title" class="form-control"
               placeholder="e.g., Plumbing Repair" required>
      </div>

      <!-- Description -->
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="4"
                  placeholder="Describe your service in detail..." required></textarea>
      </div>

      <!-- Price and Unit Row -->
      <div class="row">
        <div class="form-group">
          <label class="form-label">Price</label>
          <input type="number" name="price" step="0.01" class="form-control"
                 placeholder="500" required>
        </div>

        <div class="form-group">
          <label class="form-label">Price Unit</label>
          <select name="priceUnit" class="form-select" required>
            <option value="per hour">per hour</option>
            <option value="per visit">per visit</option>
            <option value="fixed">fixed price</option>
          </select>
        </div>
      </div>

      <!-- Location -->
      <div class="form-group">
        <label class="form-label">Location</label>
        <input type="text" name="location" class="form-control"
               placeholder="e.g., Mumbai, Delhi, etc." required>
      </div>

      <!-- Image URL (Optional) -->
      <div class="form-group">
        <label class="form-label">Image URL (optional)</label>
        <input type="text" name="imageUrl" class="form-control"
               placeholder="https://example.com/image.jpg">
      </div>

      <!-- Action Buttons -->
      <div class="action-buttons">
        <button type="submit" class="btn-primary">
          <i class="fas fa-plus-circle"></i> Add Service
        </button>
        <a href="/provider/services" class="btn-secondary">
          <i class="fas fa-times"></i> Cancel
        </a>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
